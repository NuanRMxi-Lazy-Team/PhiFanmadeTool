name: Release Cli

on:
  push:
    branches:
      - main
    paths:
      - 'PhiFanmade.Tool.Cli/PhiFanmade.Tool.Cli.csproj'
  workflow_dispatch:
    inputs:
      force_release_type:
        description: '强制指定发版类型（auto = 自动检测）'
        required: false
        default: 'auto'
        type: choice
        options:
          - auto
          - release
          - prerelease
          - skip

permissions:
  contents: write
  packages: write

jobs:
  release-cli:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Configure git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Detect version change
        id: version
        run: |
          CSPROJ="PhiFanmade.Tool.Cli/PhiFanmade.Tool.Cli.csproj"
          FORCE="${{ github.event.inputs.force_release_type || 'auto' }}"

          get_version() {
            grep -oP '<Version>\K[^<]+' "$1" 2>/dev/null || echo ""
          }

          CURRENT=$(get_version "$CSPROJ")
          if [ -z "$CURRENT" ]; then
            echo "::warning::Could not extract version from $CSPROJ, skipping."
            echo "build_type=skip" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Handle forced release types (workflow_dispatch)
          if [ "$FORCE" = "release" ]; then
            echo "Forced release type: release"
            echo "build_type=release" >> $GITHUB_OUTPUT
            echo "version=$CURRENT" >> $GITHUB_OUTPUT
            exit 0
          elif [ "$FORCE" = "prerelease" ]; then
            echo "Forced release type: prerelease"
            echo "build_type=prerelease" >> $GITHUB_OUTPUT
            echo "version=$CURRENT" >> $GITHUB_OUTPUT
            exit 0
          elif [ "$FORCE" = "skip" ]; then
            echo "Forced skip"
            echo "build_type=skip" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Auto detection: compare version with previous commit
          PREVIOUS=$(git show HEAD~1:"$CSPROJ" 2>/dev/null | grep -oP '<Version>\K[^<]+' || echo "")
          echo "Current version:  $CURRENT"
          echo "Previous version: $PREVIOUS"

          if [ "$CURRENT" = "$PREVIOUS" ]; then
            echo ".csproj changed but version is unchanged ($CURRENT), skipping release build."
            echo "build_type=skip" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Parse version components (x.y.z)
          CUR_MAJOR=$(echo "$CURRENT"  | cut -d'.' -f1)
          CUR_MINOR=$(echo "$CURRENT"  | cut -d'.' -f2)
          PREV_MAJOR=$(echo "$PREVIOUS" | cut -d'.' -f1)
          PREV_MINOR=$(echo "$PREVIOUS" | cut -d'.' -f2)

          if [ -z "$PREVIOUS" ] || [ "$CUR_MAJOR" != "$PREV_MAJOR" ] || [ "$CUR_MINOR" != "$PREV_MINOR" ]; then
            echo "Major/minor version changed ($PREVIOUS → $CURRENT) → Release"
            echo "build_type=release" >> $GITHUB_OUTPUT
          else
            echo "Patch version changed ($PREVIOUS → $CURRENT) → PreRelease"
            echo "build_type=prerelease" >> $GITHUB_OUTPUT
          fi
          echo "version=$CURRENT" >> $GITHUB_OUTPUT

      - name: Setup .NET
        if: steps.version.outputs.build_type != 'skip'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Build and publish Cli
        if: steps.version.outputs.build_type != 'skip'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BUILD_TYPE: ${{ steps.version.outputs.build_type }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          CSPROJ="PhiFanmade.Tool.Cli/PhiFanmade.Tool.Cli.csproj"
          output_dir="./artifacts/cli"
          frameworks=("net8.0" "net10.0")
          runtimes=("win-x64" "win-x86" "linux-x64")

          [ "$BUILD_TYPE" = "release" ] && CONFIG="Release" || CONFIG="PreRelease"
          echo "Build configuration: $CONFIG"

          mkdir -p "$output_dir"

          for framework in "${frameworks[@]}"; do
            for runtime in "${runtimes[@]}"; do
              echo "Building $framework / $runtime ($CONFIG)..."
              dotnet publish "$CSPROJ" \
                -c "$CONFIG" \
                -f "$framework" \
                -r "$runtime" \
                --self-contained false \
                -o "$output_dir/$framework-$runtime-fdd"

              cd "$output_dir/$framework-$runtime-fdd"
              zip -r "../PhiFanmade.OpenTool.Cli-$framework-$runtime-fdd.zip" .
              cd -
            done
          done

          TAG="Cli-v${VERSION}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "::warning::Tag $TAG already exists, skipping release creation."
            exit 0
          fi

          git tag "$TAG"
          git push origin "$TAG"

          RELEASE_FLAGS=("$TAG" --title "Cli v${VERSION}" --notes "自动发布 Cli 版本 $VERSION")
          [ "$BUILD_TYPE" = "prerelease" ] && RELEASE_FLAGS+=(--prerelease) || RELEASE_FLAGS+=(--latest)
          RELEASE_FLAGS+=(./artifacts/cli/*.zip)

          gh release create "${RELEASE_FLAGS[@]}"
          echo "✅ Created $BUILD_TYPE release: Cli v${VERSION}"
